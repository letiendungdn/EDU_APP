name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/letiendungdn/edu_app

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api-gateway
            dockerfile: services/api-gateway/Dockerfile
          - name: content-service
            dockerfile: services/content-service/Dockerfile
          - name: exam-service
            dockerfile: services/exam-service/Dockerfile
          - name: nihongo-web
            dockerfile: apps/nihongo-web/Dockerfile
          - name: english-web
            dockerfile: apps/english-web/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.name }}:latest
            ${{ env.IMAGE_PREFIX }}/${{ matrix.name }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG }}" > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Apply namespace
        run: kubectl apply -f infra/k8s/namespace.yaml

      - name: Sync secrets from GitHub Secrets
        run: |
          kubectl create secret generic edu-app-secrets \
            --namespace edu-app \
            --from-literal=POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD }}" \
            --from-literal=DATABASE_URL_NIHONGO="${{ secrets.DATABASE_URL_NIHONGO }}" \
            --from-literal=DATABASE_URL_ENGLISH="${{ secrets.DATABASE_URL_ENGLISH }}" \
            --from-literal=JWT_SECRET="${{ secrets.JWT_SECRET }}" \
            --from-literal=ADMIN_PASSWORD="${{ secrets.ADMIN_PASSWORD }}" \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret docker-registry ghcr-pull-secret \
            --namespace edu-app \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.GITHUB_TOKEN }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy workloads
        run: |
          for f in infra/k8s/*.yaml; do
            case "$(basename "$f")" in
              secret.yaml|secrets.yaml.example) continue ;;
            esac
            kubectl apply -f "$f"
          done

      - name: Wait for api-gateway rollout
        run: kubectl rollout status deployment/api-gateway -n edu-app --timeout=300s

  deploy-ssh-fallback:
    needs: deploy
    runs-on: ubuntu-latest
    if: failure() && vars.ENABLE_SSH_FALLBACK == 'true'
    environment: production
    steps:
      - name: Deploy via SSH (fallback)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/edu_app
            git pull origin main
            docker compose pull && docker compose up -d --remove-orphans
            sleep 10 && curl -f http://localhost/api/health || exit 1
