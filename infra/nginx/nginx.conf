# Lớp 3 — Reverse proxy (Docker Compose / tham chiếu cho K8s Ingress)
# Routing:
#   nihongo.*  → /api, /health → api-gateway | / → nihongo-web
#   english.*  → / → english-web (chỉ khi chạy profile `english`)

resolver 127.0.0.11 valid=10s ipv6=off;

upstream api_gateway {
    server api-gateway:3000;
}

upstream nihongo_web {
    server nihongo-web:5173;
}

server {
    listen 80;
    server_name nihongo.localhost localhost;

    client_max_body_size 10m;

    # API + Swagger (trực tiếp tới gateway, không qua Next.js rewrite)
    location /api/ {
        proxy_pass http://api_gateway/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /health {
        proxy_pass http://api_gateway/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Next.js frontend tiếng Nhật
    location / {
        proxy_pass http://nihongo_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

server {
    listen 80;
    server_name english.localhost;

    client_max_body_size 10m;

    # Next.js BFF + frontend tiếng Anh (container english-web, profile `english`)
    location / {
        set $english_upstream english-web:3001;
        proxy_pass http://$english_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
