# Default values for edu-app Helm chart.
# Override with values.prod.yaml or --set for production.

nameOverride: ""
fullnameOverride: ""

namespace: edu-app

image:
  registry: ghcr.io
  repository: letiendungdn/edu_app
  tag: latest
  pullPolicy: Always

imagePullSecrets:
  - name: ghcr-pull-secret

replicaCount:
  apiGateway: 2
  contentService: 1
  examService: 1
  nihongoWeb: 1
  englishWeb: 1
  redis: 1

postgres:
  enabled: true
  image: postgres:16-alpine
  storage: 5Gi
  user: nihongo
  database: nihongo

redis:
  enabled: true
  image: redis:7-alpine

config:
  NODE_ENV: production
  PORT: "3000"
  CONTENT_GRPC_URL: content-service:50051
  EXAM_GRPC_URL: exam-service:50052
  JWT_EXPIRES_IN: 7d
  ALLOWED_ORIGINS: "https://nihongo.example.com,https://english.example.com"
  ADMIN_EMAIL: admin@nihongo.local
  CONTENT_GRPC_PORT: "50051"
  EXAM_GRPC_PORT: "50052"
  REDIS_URL: redis://redis:6379
  API_URL: http://api-gateway:3000
  NEXT_PUBLIC_ENGLISH_APP_URL: https://english.example.com
  NEXT_PUBLIC_NIHONGO_APP_URL: https://nihongo.example.com
  POSTGRES_USER: nihongo
  POSTGRES_DB: nihongo
  INGRESS_HOST_NIHONGO: nihongo.example.com
  INGRESS_HOST_ENGLISH: english.example.com

# PLACEHOLDER — override via --set-file or external secrets in production
secrets:
  POSTGRES_PASSWORD: change-me-in-production
  DATABASE_URL_NIHONGO: postgresql://nihongo:change-me-in-production@postgres:5432/nihongo
  DATABASE_URL_ENGLISH: postgresql://nihongo:change-me-in-production@postgres:5432/english_learning
  JWT_SECRET: change-me-in-production
  ADMIN_PASSWORD: change-me-in-production

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 10m
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
  hosts:
    nihongo: nihongo.example.com
    english: english.example.com

hpa:
  apiGateway:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

resources:
  apiGateway:
    requests: { cpu: 100m, memory: 128Mi }
    limits: { cpu: 500m, memory: 512Mi }
  contentService:
    requests: { cpu: 100m, memory: 128Mi }
    limits: { cpu: 500m, memory: 512Mi }
  examService:
    requests: { cpu: 100m, memory: 128Mi }
    limits: { cpu: 500m, memory: 512Mi }
  nihongoWeb:
    requests: { cpu: 100m, memory: 256Mi }
    limits: { cpu: 500m, memory: 512Mi }
  englishWeb:
    requests: { cpu: 100m, memory: 256Mi }
    limits: { cpu: 500m, memory: 512Mi }
  redis:
    requests: { cpu: 50m, memory: 64Mi }
    limits: { cpu: 200m, memory: 128Mi }
  postgres:
    requests: { cpu: 250m, memory: 256Mi }
    limits: { cpu: "1", memory: 512Mi }
