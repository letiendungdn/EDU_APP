{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "edu-app.fullname" . }}-ingress
  namespace: {{ include "edu-app.namespace" . }}
  labels:
    {{- include "edu-app.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.hosts.nihongo }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 3000
          - path: /health
            pathType: Exact
            backend:
              service:
                name: api-gateway
                port:
                  number: 3000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nihongo-web
                port:
                  number: 5173
    - host: {{ .Values.ingress.hosts.english }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: english-web
                port:
                  number: 3001
{{- end }}
