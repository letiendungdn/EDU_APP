{{- if .Values.hpa.apiGateway.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway
  namespace: {{ include "edu-app.namespace" . }}
  labels:
    app: api-gateway
    {{- include "edu-app.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: {{ .Values.hpa.apiGateway.minReplicas }}
  maxReplicas: {{ .Values.hpa.apiGateway.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.hpa.apiGateway.targetCPUUtilizationPercentage }}
{{- end }}
