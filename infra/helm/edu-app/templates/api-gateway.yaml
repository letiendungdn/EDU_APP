apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: {{ include "edu-app.namespace" . }}
  labels:
    app: api-gateway
    {{- include "edu-app.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
      name: http
  selector:
    app: api-gateway
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: {{ include "edu-app.namespace" . }}
  labels:
    app: api-gateway
    {{- include "edu-app.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount.apiGateway }}
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: api-gateway
          image: {{ include "edu-app.image" (dict "service" "api-gateway" "Values" .Values "Chart" .Chart) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: {{ include "edu-app.configMapName" . }}
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "edu-app.secretName" . }}
                  key: DATABASE_URL_NIHONGO
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "edu-app.secretName" . }}
                  key: JWT_SECRET
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "edu-app.secretName" . }}
                  key: ADMIN_PASSWORD
          resources:
            {{- toYaml .Values.resources.apiGateway | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
