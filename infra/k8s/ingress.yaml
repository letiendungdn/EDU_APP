# Routing giống infra/nginx/nginx.conf (Lớp 3)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: edu-app-ingress
  namespace: edu-app
  labels:
    app.kubernetes.io/part-of: edu-platform
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 10m
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
spec:
  ingressClassName: nginx
  rules:
    # nihongo.example.com — /api + /health → gateway, / → frontend
    - host: nihongo.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 3000
          - path: /health
            pathType: Exact
            backend:
              service:
                name: api-gateway
                port:
                  number: 3000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nihongo-web
                port:
                  number: 5173
    # english.example.com — BFF + frontend (API nội bộ /api/*)
    - host: english.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: english-web
                port:
                  number: 3001
