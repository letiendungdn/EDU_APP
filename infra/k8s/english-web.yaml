apiVersion: v1
kind: Service
metadata:
  name: english-web
  namespace: edu-app
  labels:
    app: english-web
    app.kubernetes.io/part-of: edu-platform
spec:
  type: ClusterIP
  ports:
    - port: 3001
      targetPort: 3001
      name: http
  selector:
    app: english-web
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: english-web
  namespace: edu-app
  labels:
    app: english-web
    app.kubernetes.io/part-of: edu-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: english-web
  template:
    metadata:
      labels:
        app: english-web
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: english-web
          image: ghcr.io/letiendungdn/edu_app/english-web:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
              name: http
          envFrom:
            - configMapRef:
                name: edu-app-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: edu-app-secrets
                  key: DATABASE_URL_ENGLISH
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
