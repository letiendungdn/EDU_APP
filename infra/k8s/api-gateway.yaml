apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: edu-app
  labels:
    app: api-gateway
    app.kubernetes.io/part-of: edu-platform
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
      name: http
  selector:
    app: api-gateway
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: edu-app
  labels:
    app: api-gateway
    app.kubernetes.io/part-of: edu-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: api-gateway
          image: ghcr.io/letiendungdn/edu_app/api-gateway:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: edu-app-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: edu-app-secrets
                  key: DATABASE_URL_NIHONGO
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: edu-app-secrets
                  key: JWT_SECRET
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: edu-app-secrets
                  key: ADMIN_PASSWORD
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
